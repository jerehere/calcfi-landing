<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CalcFi — Free Financial Calculators</title>
  <meta name="description" content="600+ free financial calculators. No signup required. Instant results.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 40px 24px;
    }
    .logo {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    .tagline {
      font-size: 18px;
      color: #a3a3a3;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .stats {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .stat {
      text-align: center;
    }
    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #3b82f6;
    }
    .stat-label {
      font-size: 12px;
      color: #737373;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .cta {
      display: inline-block;
      background: #3b82f6;
      color: white;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: background 0.2s;
    }
    .cta:hover { background: #2563eb; }
    .footer {
      margin-top: 48px;
      font-size: 13px;
      color: #525252;
    }
    .footer a { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">CalcFi</div>
    <p class="tagline">600+ free financial calculators.<br>No signup. No ads. Instant results.</p>
    <div class="stats">
      <div class="stat">
        <div class="stat-number">600+</div>
        <div class="stat-label">Calculators</div>
      </div>
      <div class="stat">
        <div class="stat-number">Free</div>
        <div class="stat-label">Forever</div>
      </div>
      <div class="stat">
        <div class="stat-number">0s</div>
        <div class="stat-label">Signup</div>
      </div>
    </div>
    <a href="https://calcfi.app" class="cta">Visit CalcFi.app</a>
    <div class="footer">
      <p><a href="https://calcfi.app">calcfi.app</a> — Mortgage, Tax, Retirement, Investing & more</p>
    </div>
  </div>
</body>
</html>
